<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Elektrotexnika">
<title>Nazariy Elektrotexnika Testi (Bo‘limli & Aralash)</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
  --border: #2e3350; --accent: #4f6ef7; --accent2: #6c8afb;
  --green: #22c55e; --red: #ef4444; --yellow: #facc15;
  --text: #e8eaf6; --muted: #7b83ab; --radius: 12px;
  --gold: #facc15;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh; -webkit-text-size-adjust: 100%;
  padding-bottom: env(safe-area-inset-bottom);
}
.screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.screen.active { display: flex; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(79,110,247,0.1);
}
.logo { font-size: 44px; text-align: center; margin-bottom: 14px; }
h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
h2 { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 20px; color: var(--muted); }
.p-text { font-size: 14px; color: var(--muted); line-height: 1.6; text-align: center; margin-bottom: 20px; }

/* Bo'limlar tugmalari */
.sections-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
.section-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 14px; border-radius: var(--radius); font-size: 15px; font-weight: 600;
  cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center;
  transition: all 0.2s;
}
.section-btn:active { transform: scale(0.99); background: var(--border); }
.section-btn .arrow { color: var(--accent); font-weight: bold; }

/* Oltin rangli maxsus aralash blok */
.section-btn.mix-block {
  border: 1px solid rgba(250, 204, 21, 0.4);
  background: linear-gradient(135deg, #1e2021, #2b2613);
}
.section-btn.mix-block .arrow { color: var(--gold); }
.section-btn.mix-block span { color: #ffe680; }

.nav-header {
  width: 100%; max-width: 440px; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 16px; padding: 0 4px;
}
.back-btn {
  background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; font-weight: 600;
}
.progress-container { flex: 1; margin: 0 16px; position: relative; }
.progress-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width 0.3s; }
.counter { font-size: 14px; font-weight: 700; color: var(--muted); min-width: 50px; text-align: right; }

.q-card { padding: 24px; min-height: 380px; display: flex; flex-direction: column; }
.q-text { font-size: 17px; font-weight: 600; line-height: 1.5; margin-bottom: 24px; color: #fff; flex: 1; }
.options { display: flex; flex-direction: column; gap: 12px; }
.opt-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 14px 16px; border-radius: var(--radius); font-size: 15px; text-align: left;
  cursor: pointer; transition: all 0.2s; width: 100%; display: flex; align-items: center;
}
.opt-btn:disabled { cursor: default; }
.opt-btn.correct { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); font-weight: 700; }
.opt-btn.wrong { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }

.score-box {
  width: 120px; height: 120px; border-radius: 50%; background: var(--surface2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 20px; border: 3px solid var(--accent);
}
.score-val { font-size: 36px; font-weight: 800; color: #fff; line-height: 1; }
.score-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 4px; letter-spacing: 1px; }
.res-card h3 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px; }
.res-detail { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 24px; }
.restart-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white; border: none; padding: 16px; border-radius: var(--radius);
  font-size: 16px; font-weight: 700; width: 100%; cursor: pointer;
  box-shadow: 0 8px 20px rgba(79,110,247,0.3); transition: all 0.2s;
}
</style>
</head>
<body>

<div class="screen active" id="start-screen">
  <div class="card">
    <div class="logo">⚡</div>
    <h1>Elektrotexnika</h1>
    <h2>Yakuniy Nazorat Testlari</h2>
    <p class="p-text">Kerakli bo‘limni tanlang. 8-blokda barcha 197 ta test ichidan aralashib tushadi:</p>
    
    <div class="sections-grid">
      <button class="section-btn" onclick="startSection(1)"><span>1-bo‘lim (1 - 30 testlar)</span> <span class="arrow">&rarr;</span></button>
      <button class="section-btn" onclick="startSection(2)"><span>2-bo‘lim (31 - 60 testlar)</span> <span class="arrow">&rarr;</span></button>
      <button class="section-btn" onclick="startSection(3)"><span>3-bo‘lim (61 - 90 testlar)</span> <span class="arrow">&rarr;</span></button>
      <button class="section-btn" onclick="startSection(4)"><span>4-bo‘lim (91 - 120 testlar)</span> <span class="arrow">&rarr;</span></button>
      <button class="section-btn" onclick="startSection(5)"><span>5-bo‘lim (121 - 150 testlar)</span> <span class="arrow">&rarr;</span></button>
      <button class="section-btn" onclick="startSection(6)"><span>6-bo‘lim (151 - 180 testlar)</span> <span class="arrow">&rarr;</span></button>
      <button class="section-btn" onclick="startSection(7)"><span>7-bo‘lim (181 - 197 testlar)</span> <span class="arrow">&rarr;</span></button>
      <button class="section-btn mix-block" onclick="startSection(8)"><span>🔥 8-bo‘lim (197 tadan ARALASH 30 ta)</span> <span class="arrow">&rarr;</span></button>
    </div>
  </div>
</div>

<div class="screen" id="quiz-screen">
  <div class="nav-header">
    <button class="back-btn" onclick="goHome()">&larr; Chiqish</button>
    <div class="progress-container"><div class="progress-bg"><div class="progress-fill" id="progress"></div></div></div>
    <div class="counter" id="counter">1/30</div>
  </div>
  <div class="card q-card" id="q-card">
    </div>
</div>

<div class="screen" id="result-screen">
  <div class="card res-card">
    <div class="score-box">
      <div class="score-val" id="res-score">0</div>
      <div class="score-lbl">To‘g‘ri</div>
    </div>
    <h3 id="res-title">Yaxshi natija!</h3>
    <div class="res-detail" id="res-detail">Siz 30 tadan 0 ta savolga javob berdingiz (0%)</div>
    <button class="restart-btn" onclick="goHome()">Bosh sahifaga qaytish</button>
  </div>
</div>

let selectedSection = 1;
let sectionQuestions = [];
let currentQIndex = 0;
let correctCount = 0;

function startSection(sectionNum) {
  selectedSection = sectionNum;
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
  
  let sliced = [];
  
  if (sectionNum === 8) {
    // 8-BLOK: Hamma 197 ta testdan mutloq tasodifiy (aralash) 30 tasini tanlab olish
    const shuffledRaw = [...rawQuestions].sort(() => Math.random() - 0.5);
    sliced = shuffledRaw.slice(0, 30);
  } else {
    // 1-7 BLOKLAR: Tartibli qismlar
    const startIdx = (sectionNum - 1) * 30;
    const endIdx = sectionNum * 30;
    sliced = rawQuestions.slice(startIdx, endIdx);
  }
  
  // Variantlarni ham o'z ichida aralashtirish
  sectionQuestions = sliced.map(item => {
    const correctAns = item.options[0]; // birinchi javob har doim to'g'ri
    const mixedOptions = [...item.options].sort(() => Math.random() - 0.5);
    return {
      qText: item.q,
      opts: mixedOptions,
      answer: correctAns
    };
  });
  
  currentQIndex = 0;
  correctCount = 0;
  showQuestion();
}

function showQuestion() {
  if (currentQIndex >= sectionQuestions.length) {
    showResults();
    return;
  }
  
  const qItem = sectionQuestions[currentQIndex];
  
  document.getElementById('counter').innerText = `${currentQIndex + 1}/${sectionQuestions.length}`;
  const progressPercent = (currentQIndex / sectionQuestions.length) * 100;
  document.getElementById('progress').style.width = `${progressPercent}%`;
  
  let optionsHtml = '';
  qItem.opts.forEach(opt => {
    const safeOpt = opt.replace(/'/g, "\\'");
    optionsHtml += `<button class="opt-btn" onclick="selectOption(this, '${safeOpt}')">${opt}</button>`;
  });
  
  document.getElementById('q-card').innerHTML = `
    <div class="q-text">${qItem.qText}</div>
    <div class="options">${optionsHtml}</div>
  `;
}

function selectOption(clickedBtn, selectedVal) {
  const qItem = sectionQuestions[currentQIndex];
  const allButtons = document.querySelectorAll('.options .opt-btn');
  
  allButtons.forEach(btn => btn.disabled = true);
  
  if (selectedVal === qItem.answer) {
    clickedBtn.classList.add('correct');
    correctCount++;
  } else {
    clickedBtn.classList.add('wrong');
    allButtons.forEach(btn => {
      if (btn.innerText === qItem.answer) {
        btn.classList.add('correct');
      }
    });
  }
  
  setTimeout(() => {
    currentQIndex++;
    showQuestion();
  }, 1200);
}

function showResults() {
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  
  document.getElementById('progress').style.width = '100%';
  document.getElementById('res-score').innerText = correctCount;
  
  const total = sectionQuestions.length;
  const percent = Math.round((correctCount / total) * 100);
  document.getElementById('res-detail').innerText = `Siz ushbu bo‘limdagi jami ${total} tadan ${correctCount} ta savolga to‘g‘ri javob berdingiz (${percent}%)`;
  
  let title = "Yaxshi!";
  if (percent < 40) title = "Kuchsiz natija!";
  else if (percent < 70) title = "Yaxshi natija!";
  else if (percent < 90) title = "Juda yaxshi!";
  else title = "Mukammal natija! 🌟";
  
  document.getElementById('res-title').innerText = title;
}

function goHome() {
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('start-screen').classList.add('active');
}
